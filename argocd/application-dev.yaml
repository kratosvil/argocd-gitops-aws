apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hello-gitops-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/kratosvil/argocd-gitops-lab.git
    targetRevision: main
    path: overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: hello-gitops-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
